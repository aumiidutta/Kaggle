<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Insider Release Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="/static/style.css">
    <script>
        // Apply theme immediately before rendering to prevent page theme flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Header Banner -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Custom Python Logo SVG styling -->
                        <path d="M12 2C8.6 2 6 3.4 6 6.8H9.6C9.6 5.5 10.7 4.4 12 4.4C13.3 4.4 14.4 5.5 14.4 6.8C14.4 8.1 13.3 9.2 12 9.2H6V14.6C6 18 8.6 19.4 12 19.4C15.4 19.4 18 18 18 14.6H14.4C14.4 15.9 13.3 17 12 17C10.7 17 9.6 15.9 9.6 14.6C9.6 13.3 10.7 12.2 12 12.2H18V6.8C18 3.4 15.4 2 12 2Z" fill="url(#python-grad-1)"/>
                        <path d="M12 22C15.4 22 18 20.6 18 17.2H14.4C14.4 18.5 13.3 19.6 12 19.6C10.7 19.6 9.6 18.5 9.6 17.2C9.6 15.9 10.7 14.8 12 14.8H18V9.4C18 6 15.4 4.6 12 4.6C8.6 4.6 6 6 6 9.4H9.6C9.6 8.1 10.7 7 12 7C13.3 7 14.4 8.1 14.4 9.4C14.4 10.7 13.3 11.8 12 11.8H6V17.2C6 20.6 8.6 22 12 22Z" fill="url(#python-grad-2)" style="mix-blend-mode: screen; opacity: 0.85;"/>
                        <defs>
                            <linearGradient id="python-grad-1" x1="6" y1="2" x2="18" y2="19.4" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#3776ab"/>
                                <stop offset="1" stop-color="#265074"/>
                            </linearGradient>
                            <linearGradient id="python-grad-2" x1="6" y1="4.6" x2="18" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#ffd343"/>
                                <stop offset="1" stop-color="#d0a010"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Python Insider</h1>
                    <span>Core Dev Release Hub</span>
                </div>
            </div>
            
            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Theme" aria-label="Toggle Theme">
                    <svg class="sun-icon icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>

                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg class="icon spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Search and Filters Section -->
        <section class="controls-section">
            <div class="search-bar-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search Python updates (e.g. 3.14, JIT, security, performance...)" aria-label="Search updates">
                <button id="clear-search" class="clear-search-btn" style="display: none;" title="Clear search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- This container will be rendered dynamically by JavaScript -->
            <div class="filter-chips" id="filter-chips-container">
                <!-- Fallback chip while loading -->
                <button class="filter-chip active" data-category="all">All Updates</button>
            </div>
            
            <div class="selection-controls">
                <span id="results-count" class="results-count">Loading updates...</span>
                <div class="selection-actions-inline">
                    <button id="select-all-btn" class="btn btn-text">Select Page</button>
                    <button id="deselect-all-btn" class="btn btn-text" style="display: none;">Deselect All</button>
                </div>
            </div>
        </section>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Skeleton Loading State -->
            <div id="loading-state" class="loading-grid">
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-tag"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-line full"></div>
                    <div class="skeleton-line partial"></div>
                    <div class="skeleton-footer"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-tag"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-line full"></div>
                    <div class="skeleton-line partial"></div>
                    <div class="skeleton-footer"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-tag"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-line full"></div>
                    <div class="skeleton-line partial"></div>
                    <div class="skeleton-footer"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                <h2>No Updates Found</h2>
                <p>We couldn't find any release notes matching your filters or search term.</p>
                <button id="reset-filters-btn" class="btn btn-secondary">Reset Filters</button>
            </div>

            <!-- Notes List -->
            <div id="notes-container" class="notes-grid" style="display: none;">
                <!-- Cards injected here dynamically -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Data fetched from the <a href="https://blog.python.org/rss.xml" target="_blank" rel="noopener">Official Python Insider Blog Feed</a>. Updated in real time.</p>
        </footer>
    </div>

    <!-- Floating Action Drawer for Multi-Selection Tweet -->
    <div id="floating-drawer" class="floating-drawer">
        <div class="drawer-content">
            <div class="drawer-info">
                <span class="badge-count" id="selected-count">0</span>
                <span class="drawer-text">updates selected to share</span>
            </div>
            <div class="drawer-actions">
                <button id="tweet-selected-btn" class="btn btn-tweet">
                    <svg class="x-logo" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>Tweet Selected</span>
                </button>
                <button id="clear-selected-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Main JavaScript -->
    <script src="/static/script.js"></script>
</body>
</html>
